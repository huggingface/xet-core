language = "C"
header = "/* Generated by cbindgen from xet_capi. DO NOT EDIT BY HAND. */"
include_guard = "HF_XET_H"
autogen_warning = "/* Regenerate with `cargo build -p xet_capi`. */"
cpp_compat = true
tab_width = 4
style = "type"

[export]
prefix = ""
item_types = ["enums", "structs", "opaque", "functions", "typedefs"]

[enum]
prefix_with_name = true
