name: Crates.io Release
run-name: crates.io release ${{ inputs.tag }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to publish (e.g. 1.4.0, no v prefix)'
        required: true
      dry_run:
        description: 'Dry run — validate and package without publishing'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: crates-release
  cancel-in-progress: false

# Placeholder secrets required:
#   CARGO_REGISTRY_TOKEN — crates.io API token with publish scope.
#     Generate at https://crates.io/settings/tokens/new
#     Add as a secret in the "crates-release" GitHub environment.

jobs:
  validate:
    name: Validate & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.89.0

      - uses: ./.github/actions/cache-rust-build

      - &update_crate_versions
        name: Update crate versions
        env:
          VERSION: ${{ inputs.tag }}
        run: |
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' Cargo.toml
          find . -name "Cargo.toml" \
            -not -path "./hf_xet/*" \
            -not -path "./wasm/*" \
            -not -path "./target/*" \
            -exec sed -i 's/version = "[0-9][^"]*", path = "\.\.\//version = "'"$VERSION"'", path = "..\//g' {} +

      - name: Check workspace compiles
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Validate crate packaging
        run: |
          for crate in xet-runtime xet-core-structures xet-client xet-data hf-xet; do
            echo "=== Verifying package for $crate ==="
            cargo package -p "$crate" --allow-dirty
            echo ""
          done

  # Publishes crates in dependency order:
  #   xet-runtime → xet-core-structures → xet-client → xet-data → hf-xet
  #
  # Requires the "crates-release" GitHub environment to be configured with:
  #   - Required reviewers (approval gate)
  #   - CARGO_REGISTRY_TOKEN secret
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-22.04
    needs: [validate]
    if: ${{ !inputs.dry_run }}
    environment: crates-release
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.89.0

      - *update_crate_versions

      - name: Publish xet-runtime
        run: cargo publish -p xet-runtime --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish xet-core-structures
        run: cargo publish -p xet-core-structures --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish xet-client
        run: cargo publish -p xet-client --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish xet-data
        run: cargo publish -p xet-data --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish hf-xet
        run: cargo publish -p hf-xet --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
