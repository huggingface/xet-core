name: Test huggingface_hub xet tests

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hub-python-tests:
    runs-on:
      group: aws-general-8-plus
    steps:
      # checkout out xet-core
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Use HF registry proxies
        run: curl -fsSL https://registries.huggingface.tech/setup.sh | bash
      # checkout out huggingface_hub
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: huggingface/huggingface_hub
          path: huggingface_hub
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.10'
      - name: Install libpython for pyo3 linking
        run: |
          set -eux
          py_ver=$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          sudo apt-get update
          if ! apt-cache show "libpython${py_ver}-dev" >/dev/null 2>&1; then
            sudo apt-get install -y software-properties-common
            sudo add-apt-repository -y ppa:deadsnakes/ppa
            sudo apt-get update
          fi
          sudo apt-get install -y "libpython${py_ver}-dev"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
        with:
          toolchain: 1.94.1
      - name: Create venv
        run: python3 -m venv .venv
      - name: Build wheel
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad  # v1
        with:
          command: develop
          sccache: 'true'
          working-directory: hf_xet
      - name: Install huggingface_hub dependencies
        run: |
          source .venv/bin/activate
          python3 -m pip install -e 'huggingface_hub[testing]'
      - name: Run huggingface_hub xet tests
        run: |
          source .venv/bin/activate
          python3 -m pip install pytest-rerunfailures
          pytest huggingface_hub/tests/test_xet_*.py --reruns 2 --reruns-delay 5
      - name: Check Cargo.lock has no uncommitted changes
        run: |
          # the Build wheel step would update hf_xet/Cargo.lock if it is out of date
          test -z "$(git status --porcelain hf_xet/Cargo.lock)" || (echo "hf_xet/Cargo.lock has uncommitted changes!" && exit 1)