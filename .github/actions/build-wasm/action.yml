name: Build WASM
description: Build hf_xet_thin_wasm, hf_xet_wasm_download, and hf_xet_wasm_upload
runs:
  using: "composite"
  steps:
    - name: Save current default toolchain
      id: save-toolchain
      shell: bash
      run: echo "toolchain=$(rustup show active-toolchain | awk '{print $1}')" >> "$GITHUB_OUTPUT"
    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # master
      with:
        toolchain: nightly
        targets: wasm32-unknown-unknown
        components: rust-src
    - uses: ./.github/actions/cache-rust-build
    # Cache the cargo-installed tool binaries themselves so we skip the
    # ~1-2 min `cargo install` rebuilds on cache hit. Keyed on the exact
    # versions below; bump the key when bumping versions.
    - name: Cache wasm-bindgen-cli and wasm-pack
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
      with:
        path: |
          ~/.cargo/bin/wasm-bindgen
          ~/.cargo/bin/wasm-bindgen-test-runner
          ~/.cargo/bin/wasm-pack
          ~/.cargo/.crates.toml
          ~/.cargo/.crates2.json
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-tools-wbg-0.2.121-wp-0.14.0
    - name: Install wasm-bindgen-cli and wasm-pack
      shell: bash
      run: |
        cargo install --version 0.2.121 wasm-bindgen-cli
        cargo install --version 0.14.0 wasm-pack
    - name: Build hf_xet_thin_wasm
      shell: bash
      working-directory: wasm/hf_xet_thin_wasm
      run: |
        ./build_wasm.sh
    - name: Build hf_xet_wasm_download
      shell: bash
      working-directory: wasm/hf_xet_wasm_download
      run: |
        ./build_wasm.sh
    - name: Build hf_xet_wasm_upload
      shell: bash
      working-directory: wasm/hf_xet_wasm_upload
      run: |
        ./build_wasm.sh
    - name: Check hf-xet compiles for wasm32-unknown-unknown
      shell: bash
      run: |
        CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUSTFLAGS="-C target-feature=+atomics,+bulk-memory,+mutable-globals --cfg getrandom_backend=\"wasm_js\"" \
        cargo +nightly check \
          --target wasm32-unknown-unknown \
          -p hf-xet \
          -Z build-std=std,panic_abort
    - name: Restore default toolchain
      shell: bash
      run: rustup default ${{ steps.save-toolchain.outputs.toolchain }}
