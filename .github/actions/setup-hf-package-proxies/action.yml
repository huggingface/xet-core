name: 'Setup HF package proxies'
description: >
  Route package managers (cargo, pip, uv) through HuggingFace's internal
  supply-chain hardening proxies, which hide package versions younger than
  3 days. Only works on runners inside the shared-infra VPC
  (e.g. `runs-on: { group: infra-ci }`); the proxy load balancers are
  scheme=internal and not reachable from GitHub-hosted runners.
  See: https://www.notion.so/huggingface2/Internal-Package-Registry-Proxies-3641384ebcac8199b610c4f98f376986
inputs:
  cargo:
    description: 'Route crates.io through the HF cargo proxy.'
    required: false
    default: 'true'
  pip:
    description: 'Export PIP_INDEX_URL pointing at the HF PyPI proxy.'
    required: false
    default: 'true'
  uv:
    description: 'Export UV_INDEX_URL pointing at the HF PyPI proxy.'
    required: false
    default: 'true'
runs:
  using: composite
  steps:
    - name: Configure cargo registry proxy
      if: ${{ inputs.cargo == 'true' }}
      shell: bash
      run: |
        cargo_home="${CARGO_HOME:-$HOME/.cargo}"
        mkdir -p "$cargo_home"
        cat > "$cargo_home/config.toml" <<'EOF'
        [source.crates-io]
        replace-with = "hf-mirror"

        [source.hf-mirror]
        registry = "sparse+https://cargo.registries.huggingface.tech/"
        EOF
    - name: Export pip/uv index URLs
      shell: bash
      env:
        ENABLE_PIP: ${{ inputs.pip }}
        ENABLE_UV: ${{ inputs.uv }}
      run: |
        if [[ "$ENABLE_PIP" == "true" ]]; then
          echo "PIP_INDEX_URL=https://pypi.registries.huggingface.tech/" >> "$GITHUB_ENV"
        fi
        if [[ "$ENABLE_UV" == "true" ]]; then
          echo "UV_INDEX_URL=https://pypi.registries.huggingface.tech/" >> "$GITHUB_ENV"
        fi
