<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>hf_xet_wasm session-level dedup — CI smoke test</title>
</head>
<body>
<script type="module">
  import init, { XetSession } from '../hf_xet_wasm/pkg/hf_xet_wasm.js';

  await init();

  // Smoke for session-level (in-commit) deduplication.
  //
  // Upload the SAME 65 MiB buffer twice in a single XetUploadCommit. The
  // payload must exceed MAX_XORB_BYTES (64 MiB in xet_core_structures) so
  // the first file's processing forces an xorb cut; the cut xorb's chunks
  // land in session_shard via add_xorb_block, and the second file's
  // chunk-by-chunk dedup query then hits those entries.
  //
  // 1 MiB payloads do NOT exercise dedup here: with both files' data
  // resident in `current_session_data` and no xorb cut triggered, the
  // session_shard stays empty until commit-time finalization — by which
  // point the dedup decision for the second file's chunks has already
  // been made.
  //
  // Note on global dedup: a deterministic test of the global-dedup query
  // path (cross-commit, CAS-indexed shards) would need a chunk whose hash
  // satisfies `hash % 1024 == 0`. Random payloads only have ~0.1% chance
  // per chunk; not worth the flake. The session-shard branch of
  // chunk_hash_dedup_query is on the same surface and covers the
  // regression class.
  //
  // Asserts (in the runner):
  //   - dedup_metrics.deduped_bytes >= 64 MiB (most of file #2 deduped)
  //   - total_bytes == 2 * payload (both files were processed)
  //   - xorb_bytes_uploaded < 1.5 * payload (only ~one copy hit CAS)

  const HUB_BASE = 'https://huggingface.co';
  const PAYLOAD_SIZE = 65 * 1024 * 1024; // > MAX_XORB_BYTES (64 MiB) to force a cut between files

  async function fetchXetWriteToken({ hfToken, repoType, namespace, repo, revision }) {
    const url = `${HUB_BASE}/api/${repoType}s/${namespace}/${repo}/xet-write-token/${revision}`;
    const headers = {};
    if (hfToken) headers['Authorization'] = `Bearer ${hfToken}`;
    const resp = await fetch(url, { method: 'GET', headers });
    if (!resp.ok) throw new Error(`xet-write-token ${resp.status}: ${await resp.text()}`);
    const json = await resp.json();
    if (!json.accessToken || !json.casUrl || !json.exp) {
      throw new Error(`xet-write-token missing fields: ${JSON.stringify(json)}`);
    }
    return json;
  }

  function randomBytes(n) {
    const buf = new Uint8Array(n);
    for (let off = 0; off < buf.byteLength; off += 65536) {
      crypto.getRandomValues(buf.subarray(off, Math.min(off + 65536, buf.byteLength)));
    }
    return buf;
  }

  window.runTest = async function runTest(hfToken) {
    try {
      const params = {
        hfToken,
        repoType: 'dataset',
        namespace: 'xet-team',
        repo: 'xet-wasm-test',
        revision: 'main',
      };

      console.log('xet-write-token...');
      const { accessToken, exp, casUrl } = await fetchXetWriteToken(params);
      console.log(`token ok: casUrl=${casUrl} exp=${exp}`);

      const session = new XetSession();
      const commit = await session.newUploadCommit(casUrl, accessToken, exp);

      const payload = randomBytes(PAYLOAD_SIZE);

      console.log('uploadBytes #1 (first.bin)...');
      const metaFirst = await commit.uploadBytes(payload, 'compute', 'first.bin');

      console.log('uploadBytes #2 (second.bin, same payload)...');
      const metaSecond = await commit.uploadBytes(payload, 'compute', 'second.bin');

      console.log('commit()...');
      const commitReport = await commit.commit();
      console.log('commitReport.dedup_metrics:', JSON.stringify(commitReport.dedup_metrics));

      return {
        ok: true,
        first: metaFirst,
        second: metaSecond,
        commitReport,
        payloadSize: PAYLOAD_SIZE,
      };
    } catch (e) {
      return { ok: false, error: String(e?.message || e), stack: e?.stack };
    }
  };

  console.log('test page ready');
</script>
</body>
</html>
