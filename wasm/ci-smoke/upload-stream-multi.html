<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>hf_xet_wasm uploadStream (multi-file) — CI smoke test</title>
</head>
<body>
<script type="module">
  import init, { XetSession } from '../hf_xet_wasm/pkg/hf_xet_wasm.js';

  await init();

  // End-to-end smoke for concurrent multi-file uploadStream in a single
  // XetUploadCommit. Each stream writes distinct random chunks so dedup
  // cannot collapse them; all FILE_COUNT streams must surface in
  // commitReport.uploads with distinct xet hashes.
  //
  // Each stream lives in its own async task and writes CHUNKS_PER_FILE x
  // CHUNK_SIZE bytes interleaved with the others.

  const HUB_BASE = 'https://huggingface.co';
  const FILE_COUNT = 3;
  const CHUNK_SIZE = 64 * 1024;     // 64 KiB per write — fits crypto.getRandomValues cap
  const CHUNKS_PER_FILE = 8;        // 8 * 64 KiB = 512 KiB per file → 1.5 MiB total
  const FILE_SIZE = CHUNK_SIZE * CHUNKS_PER_FILE;

  async function fetchXetWriteToken({ hfToken, repoType, namespace, repo, revision }) {
    const url = `${HUB_BASE}/api/${repoType}s/${namespace}/${repo}/xet-write-token/${revision}`;
    const headers = {};
    if (hfToken) headers['Authorization'] = `Bearer ${hfToken}`;
    const resp = await fetch(url, { method: 'GET', headers });
    if (!resp.ok) throw new Error(`xet-write-token ${resp.status}: ${await resp.text()}`);
    const json = await resp.json();
    if (!json.accessToken || !json.casUrl || !json.exp) {
      throw new Error(`xet-write-token missing fields: ${JSON.stringify(json)}`);
    }
    return json;
  }

  async function streamOneFile(commit, trackingName) {
    const stream = await commit.uploadStream(trackingName, 'compute');
    for (let i = 0; i < CHUNKS_PER_FILE; i++) {
      const chunk = new Uint8Array(CHUNK_SIZE);
      crypto.getRandomValues(chunk);
      await stream.write(chunk);
    }
    return stream.finish();
  }

  window.runTest = async function runTest(hfToken) {
    try {
      const params = {
        hfToken,
        repoType: 'dataset',
        namespace: 'xet-team',
        repo: 'xet-wasm-test',
        revision: 'main',
      };

      console.log('xet-write-token...');
      const { accessToken, exp, casUrl } = await fetchXetWriteToken(params);
      console.log(`token ok: casUrl=${casUrl} exp=${exp}`);

      const session = new XetSession();
      const commit = await session.newUploadCommit(casUrl, accessToken, exp);

      console.log(`uploadStream x${FILE_COUNT} (${CHUNKS_PER_FILE}x${CHUNK_SIZE} each, concurrent)...`);
      const uploadResults = await Promise.all(
        Array.from({ length: FILE_COUNT }, (_, i) => streamOneFile(commit, `wasm-smoke-stream-multi-${i}.bin`)),
      );
      console.log('streams done:', uploadResults.map((m) => m?.xet_info?.hash));

      console.log('commit()...');
      const commitReport = await commit.commit();
      console.log('commitReport:', JSON.stringify(commitReport));

      return {
        ok: true,
        uploadResults,
        commitReport,
        hashes: uploadResults.map((m) => m?.xet_info?.hash),
        fileSizes: uploadResults.map((m) => m?.xet_info?.file_size),
        expectedFileCount: FILE_COUNT,
        expectedFileSize: FILE_SIZE,
      };
    } catch (e) {
      return { ok: false, error: String(e?.message || e), stack: e?.stack };
    }
  };

  console.log('test page ready');
</script>
</body>
</html>
