<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>hf_xet_wasm download (multi-file) — CI smoke test</title>
</head>
<body>
<script type="module">
  import init, { XetSession } from '../hf_xet_wasm/pkg/hf_xet_wasm.js';

  await init();

  // End-to-end smoke for concurrent multi-file download in one
  // XetDownloadStreamGroup. Same pinned commit as download.html so silent
  // drift on `main` can't change behavior without surfacing the cause.
  //
  // Asserts (in the runner):
  //   - all 3 streams complete
  //   - each download's byteCount matches the paths-info size for that
  //     filepath — a stream-fan-out bug that crossed buffers between
  //     downloads would produce mismatched sizes (or a sha256 mismatch if
  //     we ever pin those too)

  const HUB_BASE = 'https://huggingface.co';

  // Pinned subset of hf-internal-testing/tiny-random-bert@<rev>. Only these
  // two files are Xet-stored on this commit (the json/txt sidecars are too
  // small to be promoted to Xet). The size delta — 540 KiB vs 26 MiB — is
  // intentional: a fan-out bug that crossed stream buffers would produce
  // mismatched byteCounts that no single-file test could miss.
  const REPO = { repoType: 'model', namespace: 'hf-internal-testing', repo: 'tiny-random-bert' };
  const REVISION = 'f171d7baecaf37b5da5a3616d8833b9969753535';
  const FILEPATHS = ['pytorch_model.bin', 'tf_model.h5'];

  async function fetchPathsInfo({ hfToken, repoType, namespace, repo, revision, paths }) {
    const url = `${HUB_BASE}/api/${repoType}s/${namespace}/${repo}/paths-info/${revision}`;
    const headers = { 'Content-Type': 'application/json' };
    if (hfToken) headers['Authorization'] = `Bearer ${hfToken}`;
    const resp = await fetch(url, {
      method: 'POST',
      headers,
      body: JSON.stringify({ paths, expand: false }),
    });
    if (!resp.ok) throw new Error(`paths-info ${resp.status}: ${await resp.text()}`);
    const arr = await resp.json();
    return arr;
  }

  async function fetchXetReadToken({ hfToken, repoType, namespace, repo, revision }) {
    const url = `${HUB_BASE}/api/${repoType}s/${namespace}/${repo}/xet-read-token/${revision}`;
    const headers = {};
    if (hfToken) headers['Authorization'] = `Bearer ${hfToken}`;
    const resp = await fetch(url, { method: 'GET', headers });
    if (!resp.ok) throw new Error(`xet-read-token ${resp.status}: ${await resp.text()}`);
    const json = await resp.json();
    if (!json.accessToken || !json.casUrl) {
      throw new Error(`xet-read-token missing fields: ${JSON.stringify(json)}`);
    }
    return json;
  }

  async function drainStream(stream) {
    let total = 0;
    while (true) {
      const chunk = await stream.next();
      if (chunk === undefined) break;
      total += chunk.byteLength;
    }
    return total;
  }

  window.runTest = async function runTest(hfToken) {
    try {
      const params = { hfToken, ...REPO, revision: REVISION, paths: FILEPATHS };

      console.log(`paths-info for ${FILEPATHS.length} files...`);
      const arr = await fetchPathsInfo(params);
      const fileInfos = FILEPATHS.map((p) => {
        const entry = arr.find((e) => e.path === p);
        if (!entry?.xetHash) {
          throw new Error(`paths-info missing xetHash for ${p}: ${JSON.stringify(entry)}`);
        }
        return { path: p, xetHash: entry.xetHash, size: entry.size };
      });
      console.log('paths-info ok:', fileInfos.map((f) => `${f.path}=${f.size}`).join(', '));

      console.log('xet-read-token...');
      const { accessToken, exp, casUrl } = await fetchXetReadToken(params);
      console.log(`token ok: casUrl=${casUrl} exp=${exp}`);

      const session = new XetSession();
      const group = await session.newDownloadStreamGroup(casUrl, accessToken, exp);

      console.log(`downloadStream x${FILEPATHS.length} concurrent...`);
      const downloads = await Promise.all(
        fileInfos.map(async (fi) => {
          const stream = await group.downloadStream({ hash: fi.xetHash, file_size: fi.size });
          const byteCount = await drainStream(stream);
          return { path: fi.path, byteCount, expectedSize: fi.size };
        }),
      );
      console.log('downloads done:', downloads.map((d) => `${d.path}=${d.byteCount}`).join(', '));

      return { ok: true, downloads };
    } catch (e) {
      return { ok: false, error: String(e?.message || e), stack: e?.stack };
    }
  };

  console.log('test page ready');
</script>
</body>
</html>
