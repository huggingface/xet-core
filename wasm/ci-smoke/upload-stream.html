<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>hf_xet_wasm uploadStream — CI smoke test</title>
</head>
<body>
<script type="module">
  import init, { XetSession } from '../hf_xet_wasm/pkg/hf_xet_wasm.js';

  await init();

  // End-to-end smoke for the wasm streaming upload path. Same Hub + CAS
  // round-trip as upload.html, but exercises XetUploadCommit::uploadStream /
  // XetStreamUpload::{write, finish} instead of the bytes-in-one-shot path.
  //
  // Asserts:
  //   - stream.write resolves for every chunk
  //   - stream.finish resolves and returns metadata with non-empty hash and
  //     the expected file_size
  //   - commit() resolves and returns dedup_metrics with positive byte
  //     counters and a non-empty uploads map (proves a fresh xorb push)

  const HUB_BASE = 'https://huggingface.co';
  const CHUNK_SIZE = 64 * 1024; // 64 KiB per write — forces multiple stream chunks
  const TOTAL_CHUNKS = 16;       // 16 * 64 KiB = 1 MiB total
  const PAYLOAD_SIZE = CHUNK_SIZE * TOTAL_CHUNKS;

  async function fetchXetWriteToken({ hfToken, repoType, namespace, repo, revision }) {
    const url = `${HUB_BASE}/api/${repoType}s/${namespace}/${repo}/xet-write-token/${revision}`;
    const headers = {};
    if (hfToken) headers['Authorization'] = `Bearer ${hfToken}`;
    const resp = await fetch(url, { method: 'GET', headers });
    if (!resp.ok) throw new Error(`xet-write-token ${resp.status}: ${await resp.text()}`);
    const json = await resp.json();
    if (!json.accessToken || !json.casUrl || !json.exp) {
      throw new Error(`xet-write-token missing fields: ${JSON.stringify(json)}`);
    }
    return json;
  }

  window.runTest = async function runTest(hfToken) {
    try {
      const params = {
        hfToken,
        repoType: 'dataset',
        namespace: 'xet-team',
        repo: 'xet-wasm-test',
        revision: 'main',
      };

      console.log('xet-write-token...');
      const { accessToken, exp, casUrl } = await fetchXetWriteToken(params);
      console.log(`token ok: casUrl=${casUrl} exp=${exp}`);

      const session = new XetSession();
      const commit = await session.newUploadCommit(casUrl, accessToken, exp);

      console.log(`uploadStream(...) opening, ${TOTAL_CHUNKS} chunks of ${CHUNK_SIZE} bytes...`);
      const stream = await commit.uploadStream('wasm-smoke-stream.bin', 'compute');

      for (let i = 0; i < TOTAL_CHUNKS; i++) {
        const chunk = new Uint8Array(CHUNK_SIZE);
        // crypto.getRandomValues caps at 64 KiB per call — chunk fits exactly.
        crypto.getRandomValues(chunk);
        await stream.write(chunk);
      }

      console.log('stream.finish()...');
      const metadata = await stream.finish();
      console.log('metadata:', JSON.stringify(metadata));

      console.log('commit()...');
      const commitReport = await commit.commit();
      console.log('commitReport:', JSON.stringify(commitReport));

      return {
        ok: true,
        metadata,
        commitReport,
        hash: metadata?.xet_info?.hash,
        fileSize: metadata?.xet_info?.file_size,
        payloadSize: PAYLOAD_SIZE,
      };
    } catch (e) {
      return { ok: false, error: String(e?.message || e), stack: e?.stack };
    }
  };

  console.log('test page ready');
</script>
</body>
</html>
