<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>hf_xet_wasm uploadBytes (multi-file) — CI smoke test</title>
</head>
<body>
<script type="module">
  import init, { XetSession } from '../hf_xet_wasm/pkg/hf_xet_wasm.js';

  await init();

  // End-to-end smoke for concurrent multi-file uploadBytes in a single
  // XetUploadCommit. Each file is a distinct random buffer so dedup cannot
  // collapse them; all FILE_COUNT uploads must surface in commitReport.uploads
  // with distinct xet hashes.
  //
  // Asserts (in the runner):
  //   - all uploadBytes calls resolve with non-empty hash + expected file_size
  //   - commitReport.uploads contains FILE_COUNT entries with FILE_COUNT distinct hashes
  //   - commitReport.dedup_metrics has positive xorb/shard/total bytes uploaded

  const HUB_BASE = 'https://huggingface.co';
  const FILE_COUNT = 3;
  const FILE_SIZE = 512 * 1024; // 512 KiB per file → 1.5 MiB total

  async function fetchXetWriteToken({ hfToken, repoType, namespace, repo, revision }) {
    const url = `${HUB_BASE}/api/${repoType}s/${namespace}/${repo}/xet-write-token/${revision}`;
    const headers = {};
    if (hfToken) headers['Authorization'] = `Bearer ${hfToken}`;
    const resp = await fetch(url, { method: 'GET', headers });
    if (!resp.ok) throw new Error(`xet-write-token ${resp.status}: ${await resp.text()}`);
    const json = await resp.json();
    if (!json.accessToken || !json.casUrl || !json.exp) {
      throw new Error(`xet-write-token missing fields: ${JSON.stringify(json)}`);
    }
    return json;
  }

  function randomBytes(n) {
    const buf = new Uint8Array(n);
    for (let off = 0; off < buf.byteLength; off += 65536) {
      crypto.getRandomValues(buf.subarray(off, Math.min(off + 65536, buf.byteLength)));
    }
    return buf;
  }

  window.runTest = async function runTest(hfToken) {
    try {
      const params = {
        hfToken,
        repoType: 'dataset',
        namespace: 'xet-team',
        repo: 'xet-wasm-test',
        revision: 'main',
      };

      console.log('xet-write-token...');
      const { accessToken, exp, casUrl } = await fetchXetWriteToken(params);
      console.log(`token ok: casUrl=${casUrl} exp=${exp}`);

      const session = new XetSession();
      const commit = await session.newUploadCommit(casUrl, accessToken, exp);

      console.log(`uploadBytes x${FILE_COUNT} (${FILE_SIZE} bytes each, concurrent)...`);
      const uploadResults = await Promise.all(
        Array.from({ length: FILE_COUNT }, (_, i) => {
          const data = randomBytes(FILE_SIZE);
          return commit.uploadBytes(data, 'compute', `wasm-smoke-multi-${i}.bin`);
        }),
      );
      console.log('uploads done:', uploadResults.map((m) => m?.xet_info?.hash));

      console.log('commit()...');
      const commitReport = await commit.commit();
      console.log('commitReport:', JSON.stringify(commitReport));

      return {
        ok: true,
        uploadResults,
        commitReport,
        hashes: uploadResults.map((m) => m?.xet_info?.hash),
        fileSizes: uploadResults.map((m) => m?.xet_info?.file_size),
        expectedFileCount: FILE_COUNT,
        expectedFileSize: FILE_SIZE,
      };
    } catch (e) {
      return { ok: false, error: String(e?.message || e), stack: e?.stack };
    }
  };

  console.log('test page ready');
</script>
</body>
</html>
