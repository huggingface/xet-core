<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>hf_xet_wasm mixed bytes+stream — CI smoke test</title>
</head>
<body>
<script type="module">
  import init, { XetSession } from '../hf_xet_wasm/pkg/hf_xet_wasm.js';

  await init();

  // Smoke for heterogeneous upload handles in a single XetUploadCommit:
  // one file uploaded via uploadBytes, another via uploadStream, both
  // committed together. Real users mix both — this verifies the
  // file-handle aggregation in XetUploadCommit::commit() handles both
  // handle types side-by-side and merges them into the same
  // commitReport.uploads map.
  //
  // The two payloads are distinct random buffers so dedup cannot collapse
  // them and the runner can verify both ended up in the report with
  // distinct hashes.

  const HUB_BASE = 'https://huggingface.co';
  const BYTES_SIZE = 256 * 1024;     // 256 KiB single-shot
  const STREAM_CHUNK = 64 * 1024;    // 64 KiB per write
  const STREAM_CHUNKS = 4;           // 4 * 64 KiB = 256 KiB streamed
  const STREAM_SIZE = STREAM_CHUNK * STREAM_CHUNKS;

  async function fetchXetWriteToken({ hfToken, repoType, namespace, repo, revision }) {
    const url = `${HUB_BASE}/api/${repoType}s/${namespace}/${repo}/xet-write-token/${revision}`;
    const headers = {};
    if (hfToken) headers['Authorization'] = `Bearer ${hfToken}`;
    const resp = await fetch(url, { method: 'GET', headers });
    if (!resp.ok) throw new Error(`xet-write-token ${resp.status}: ${await resp.text()}`);
    const json = await resp.json();
    if (!json.accessToken || !json.casUrl || !json.exp) {
      throw new Error(`xet-write-token missing fields: ${JSON.stringify(json)}`);
    }
    return json;
  }

  function randomBytes(n) {
    const buf = new Uint8Array(n);
    for (let off = 0; off < buf.byteLength; off += 65536) {
      crypto.getRandomValues(buf.subarray(off, Math.min(off + 65536, buf.byteLength)));
    }
    return buf;
  }

  window.runTest = async function runTest(hfToken) {
    try {
      const params = {
        hfToken,
        repoType: 'dataset',
        namespace: 'xet-team',
        repo: 'xet-wasm-test',
        revision: 'main',
      };

      console.log('xet-write-token...');
      const { accessToken, exp, casUrl } = await fetchXetWriteToken(params);
      console.log(`token ok: casUrl=${casUrl} exp=${exp}`);

      const session = new XetSession();
      const commit = await session.newUploadCommit(casUrl, accessToken, exp);

      // Kick off both flows concurrently so their finalize_ingestion /
      // stream.finish completions interleave on the single-threaded wasm
      // executor — catches any handle-tracking races where one path
      // clobbers the other's metadata before commit() aggregates them.
      console.log('uploadBytes + uploadStream concurrently...');

      const bytesPromise = (async () => {
        const data = randomBytes(BYTES_SIZE);
        return commit.uploadBytes(data, 'compute', 'via-bytes.bin');
      })();

      const streamPromise = (async () => {
        const stream = await commit.uploadStream('via-stream.bin', 'compute');
        for (let i = 0; i < STREAM_CHUNKS; i++) {
          const chunk = new Uint8Array(STREAM_CHUNK);
          crypto.getRandomValues(chunk);
          await stream.write(chunk);
        }
        return stream.finish();
      })();

      const [bytesMeta, streamMeta] = await Promise.all([bytesPromise, streamPromise]);
      console.log(`uploaded: bytes=${bytesMeta?.xet_info?.hash} stream=${streamMeta?.xet_info?.hash}`);

      console.log('commit()...');
      const commitReport = await commit.commit();
      console.log('commitReport:', JSON.stringify(commitReport));

      return {
        ok: true,
        bytesMeta,
        streamMeta,
        commitReport,
        bytesSize: BYTES_SIZE,
        streamSize: STREAM_SIZE,
      };
    } catch (e) {
      return { ok: false, error: String(e?.message || e), stack: e?.stack };
    }
  };

  console.log('test page ready');
</script>
</body>
</html>
